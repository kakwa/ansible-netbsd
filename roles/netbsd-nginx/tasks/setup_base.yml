---
# Base nginx installation and configuration (pkgsrc: make install only)

- name: Build and install nginx stack from pkgsrc (make install)
  ansible.builtin.command: make install
  args:
    chdir: "{{ pkgsrc_tree }}/{{ item.path }}"
    creates: "{{ item.creates }}"
  loop: "{{ nginx_pkgsrc_build_targets }}"
  loop_control:
    label: "{{ pkgsrc_tree }}/{{ item.path }}"
  become: true
  tags:
    - nginx-base

- name: Install nginx init script
  ansible.builtin.copy:
    src: /usr/pkg/share/examples/rc.d/nginx
    dest: /etc/rc.d/nginx
    owner: root
    group: wheel
    mode: '0755'
    remote_src: true
    force: false
  tags:
    - nginx-base

- name: Configure main nginx configuration
  template:
    src: nginx.conf.j2
    dest: /usr/pkg/etc/nginx/nginx.conf
    owner: root
    group: wheel
    mode: '0644'
  notify: restart nginx
  tags:
    - nginx-base

- name: Create nginx sites-available directory
  file:
    path: /usr/pkg/etc/nginx/sites-available
    state: directory
    owner: root
    group: wheel
    mode: '0755'
  tags:
    - nginx-base

- name: Create nginx sites-enabled directory
  file:
    path: /usr/pkg/etc/nginx/sites-enabled
    state: directory
    owner: root
    group: wheel
    mode: '0755'
  tags:
    - nginx-base
